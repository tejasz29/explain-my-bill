services:
  - type: web
    name: explain-my-bill-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: qwen/qwen3.6-27b
      - key: CORS_ORIGINS
        value: https://explain-my-bill.vercel.app
